<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>KochList</title>

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />
</head>

<body>

  <!-- ========================= -->
  <!-- SCREEN 1: START -->
  <!-- ========================= -->
  <div id="screen-start" class="screen">

    <!-- Mittlerer Bereich -->
    <div class="middle start-middle">

      <h1>Was möchten Sie kochen?</h1>

      <!-- Eingabebereich -->
      <div class="input-wrapper">
        <input
          id="text-input"
          type="text"
          placeholder="z. B. Pasta für 2 Personen"
        />
        <!-- Mikrofon-Button (nur wenn unterstützt) -->
        <button id="voice-btn" class="voice-btn hidden" title="Spracheingabe">🎤</button>
      </div>

    </div>

    <!-- Unterer Bereich -->
    <div class="bottom">
      <button id="generate-btn" class="primary">
        Einkaufsliste erstellen
      </button>
    </div>

  </div>


  <!-- ========================= -->
  <!-- SCREEN 2: LOADING -->
  <!-- ========================= -->
  <div id="screen-loading" class="screen hidden">

    <div class="middle">

      <!-- Lade-Animation -->
      <div class="loader"></div>

      <!-- Dynamischer Text -->
      <h2 id="loading-text">
        Analysiere Zutaten...
      </h2>

    </div>

  </div>


  <!-- ========================= -->
  <!-- SCREEN 3: RESULT -->
  <!-- ========================= -->
  <div id="screen-result" class="screen hidden">

    <!-- Kopfbereich -->
    <div class="result-header">
      <p class="result-label">Einkaufsliste für</p>
      <h2 id="dish-name"></h2>
    </div>

    <!-- Einkaufsliste -->
    <div class="middle">

      <!-- Toggle -->
      <div class="toggle-card">
        <span class="toggle-label">nur Einkaufszutaten</span>
        <label class="switch">
          <input type="checkbox" id="toggle-base" checked />
          <span class="slider"></span>
        </label>
      </div>

      <!-- Zutatenliste -->
      <div class="list-card">
        <ul id="ingredients-list"></ul>
        <div id="empty-msg" class="empty-msg hidden">
          Alle Zutaten sind Basiszutaten 🎉
        </div>
      </div>

      <!-- Paywall-Banner (weich) -->
      <div id="paywall-banner" class="paywall-banner hidden">
        <span>✨ Gefällt dir KochList? Bald als Premium-Version verfügbar.</span>
      </div>

    </div>

    <!-- Aktionen unten -->
    <div class="bottom">
      <button class="primary store-btn-main" data-url="https://www.rewe.de">
        🛒 Im Supermarkt bestellen
      </button>
      <button id="back-btn" class="btn-secondary">
        ← Zurück
      </button>
    </div>

  </div>


  <!-- ========================= -->
  <!-- SCREEN 4: LOADING -->
  <!-- (Paywall entfernt – Banner im Result-Screen) -->
  <!-- ========================= -->


  <!-- ========================= -->
  <!-- SCRIPT -->
  <!-- ========================= -->
  <script type="module" src="app.js"></script>

</body>
</html>
